version: "3.8"

x-common-env: &common-env
  CYCLONEDDS_URI: >-
    <CycloneDDS><Domain><Discovery><MaxAutoParticipantIndex>1000</MaxAutoParticipantIndex></Discovery></Domain></CycloneDDS>
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  ROS_DOMAIN_ID: "0"

services:

  turtlebot-rviz:
    image: cinoderobotics/turtlebot4_navigation:kilted-amd64-v1.2.0
    container_name: ros2-turtlebot4-rviz-kilted
    tty: True
    network_mode: host
    environment:
      <<: *common-env
      DISPLAY: ${DISPLAY}
      ROS_DISTRO: kilted
      QT_X11_NO_MITSHM: "0"
      QT_QPA_PLATFORM: xcb
      MESA_LOADER_DRIVER_OVERRIDE: radeonsi
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    ipc: host
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ./turtlebot4/turtlebot4_navigation/maps/house.yaml:/opt/ros/kilted/share/nav2_bringup/maps/house.yaml:ro
      - ./turtlebot4/turtlebot4_navigation/maps/house.pgm:/opt/ros/kilted/share/nav2_bringup/maps/house.pgm:ro

      - ./turtlebot4/turtlebot4_navigation/maps/bot4House.yaml:/opt/ros/kilted/share/nav2_bringup/maps/bot4House.yaml:ro
      - ./turtlebot4/turtlebot4_navigation/maps/bot4House.pgm:/opt/ros/kilted/share/nav2_bringup/maps/bot4House.pgm:ro

      - ./graphs/depot_graph.geojson:/opt/ros/kilted/share/nav2_bringup/graphs/depot_graph.geojson:rw
      - ./graphs/warehouse_graph.geojson:/opt/ros/kilted/share/nav2_bringup/graphs/warehouse_graph.geojson:rw
      - ./graphs/test_graph.geojson:/opt/ros/kilted/share/nav2_bringup/graphs/test_graph.geojson:rw
      - ./graphs/house_graph.geojson:/opt/ros/kilted/share/nav2_bringup/graphs/house_graph.geojson:rw
      - ./graphs/bot4House_graph.geojson:/opt/ros/kilted/share/nav2_bringup/graphs/bot4House_graph.geojson:rw

    command: /bin/bash -c 'ros2 launch nav2_rviz_plugins route_tool.launch.py yaml_filename:=/opt/ros/kilted/share/nav2_bringup/maps/bot4House.yaml'
